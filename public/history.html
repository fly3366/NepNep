<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'" />
  <title>Translation History</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      width: 100%;
      background: #1a1a2e;
      color: #eee;
      font-family: 'Microsoft YaHei', 'PingFang SC', 'Segoe UI', sans-serif;
    }
    body { display: flex; flex-direction: column; }
    .titlebar {
      -webkit-app-region: drag;
      height: 36px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      background: #16213e;
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      flex-shrink: 0;
    }
    .titlebar span { pointer-events: none; }
    #list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }
    #list::-webkit-scrollbar { width: 6px; }
    #list::-webkit-scrollbar-track { background: transparent; }
    #list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    .entry {
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .entry:last-child { border-bottom: none; }
    .time {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 4px;
    }
    .origin {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      line-height: 1.5;
      margin-bottom: 2px;
    }
    .translation {
      font-size: 15px;
      color: #fff;
      font-weight: 600;
      line-height: 1.5;
    }
    .empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: rgba(255,255,255,0.25);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="titlebar"><span>Translation History</span></div>
  <div id="list"><div class="empty">No records yet</div></div>
</body>
</html>
