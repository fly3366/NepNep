name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm run test

  build:
    needs: lint-and-test
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x64
            platform: win
            eb-platform: win
          - os: windows-latest
            arch: arm64
            platform: win
            eb-platform: win
          - os: macos-latest
            arch: x64
            platform: mac
            eb-platform: mac
          - os: macos-latest
            arch: arm64
            platform: mac
            eb-platform: mac
          - os: ubuntu-latest
            arch: x64
            platform: linux
            eb-platform: linux
          - os: ubuntu-24.04-arm
            arch: arm64
            platform: linux
            eb-platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Cache electron-builder
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron-builder
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-${{ matrix.arch }}-electron-builder-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-electron-builder-
            ${{ runner.os }}--electron-builder-

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build -- --${{ matrix.eb-platform }} --${{ matrix.arch }}

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: nepnep-${{ matrix.platform }}-${{ matrix.arch }}
          path: release/**/nepnep*windows*.exe
          retention-days: 7

      - name: Upload artifacts (macOS)
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: nepnep-${{ matrix.platform }}-${{ matrix.arch }}
          path: release/**/nepnep*macos*.dmg
          retention-days: 7

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: nepnep-${{ matrix.platform }}-${{ matrix.arch }}
          path: release/**/nepnep*linux*.AppImage
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true